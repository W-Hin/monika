name: monika
description: "MONIKA - Intelligent Mobile HR Management System with Geo-Fenced IoT Attendance Taking and Rule-Based Machine Learning Training Prediction"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8

  # IoT Sensor packages (Phase 1: imported but not yet wired to real sensors)
  # Phase 2+ will activate these for real GPS, WiFi, and device token binding
  geolocator: ^13.0.4
  network_info_plus: ^6.1.1
  device_info_plus: ^11.4.0

  # Secure local storage for JWT session tokens (Phase 2+)
  flutter_secure_storage: ^9.2.4

  # HTTP client for PHP REST API calls (Phase 2+)
  http: ^1.4.0

  # Local data persistence (Phase 1: not used; Phase 2+: cache tokens/settings)
  shared_preferences: ^2.5.3

  # Permission handling for GPS and WiFi access
  permission_handler: ^11.4.0

  # Date formatting utilities
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true